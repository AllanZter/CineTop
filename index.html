<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CineTop - Filmes Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
  .no-scrollbar::-webkit-scrollbar {
    display: none;
  }
  .no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
</style>
</head>

<body class="bg-gray-950 text-white">
<header class="bg-gray-900 shadow-lg px-6 py-4">

  <div class="flex items-center justify-between">

    <!--Logo-->
  <a href="#" class="text-3xl font-extrabold tracking-wider bg-gradient-to-r from-red-500 to-yellow-400 bg-clip-text text-transparent">
  Cine<span class="text-white">Top</span>
</a>

    <!-- Menu Desktop -->
    <nav class="hidden md:flex gap-6 text-gray-300">
      <a href="#" class="hover:text-white transition">Início</a>
      <a href="#" class="hover:text-white transition">Filmes</a>
      <a href="#" class="hover:text-white transition">Series</a>
      <a href="#" class="hover:text-white transition">Infantil</a>
      <a href="#" class="hover:text-white transition">Lançamentos</a>
      <a href="#" class="hover:text-white transition">Categorias</a>
      <a href="#" class="hover:text-white transition">Contato</a>
    </nav>

    <!-- Busca Desktop -->
    <div class="hidden md:flex bg-gray-800 rounded-lg overflow-hidden">
      <input 
        type="text" 
        placeholder="Buscar filme..."
        class="bg-transparent px-4 py-2 text-sm focus:outline-none"
      />
      <button class="bg-red-500 hover:bg-red-600 px-4 transition">
        Buscar
      </button>    
    
    </div>
    
    <div class="hidden md:flex">
      <button class=" bg-red-500 hover:bg-red-600 px-5 py-2 rounded-lg font-medium transition shadow-md">
      Inscreva-se
    </button>
    </div>
     

    <!-- Botão Mobile -->
    <button id="menuBtn" class="md:hidden text-white text-2xl">
      ☰
    </button>


  </div>

  <!-- Menu Mobile -->
  <div id="mobileMenu" class="hidden mt-4 flex flex-col gap-4 text-gray-300 md:hidden">

    <a href="#" class="hover:text-white">Início</a>
    <a href="#" class="hover:text-white">Filmes</a>
    <a href="#" class="hover:text-white">Lançamentos</a>
    <a href="#" class="hover:text-white">Contato</a>

    <div class="flex bg-gray-800 rounded-lg overflow-hidden">
      <input 
        type="text" 
        placeholder="Buscar filme..."
        class="bg-transparent px-4 py-2 text-sm focus:outline-none w-full"
      />
      <button class="bg-red-500 px-4">
        Buscar
      </button>
    </div>

    <button class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded-lg font-medium">
      Inscreva-se
    </button>

  </div>

</header>
<main class="px-8 py-10 space-y-14">

  <!-- Seção Filmes -->
  <section class="space-y-16">

<!-- Drama -->
<div>
  <h2 class="mb-5 text-xl font-semibold">Drama</h2>
  <div class="relative">
    <button id="btn-esquerda-drama"
      class="absolute left-0 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black px-4 py-2 rounded-full z-10">‹</button>

    <div id="drama"
      class="flex gap-6 overflow-x-auto scroll-smooth px-12 pb-4 no-scrollbar"></div>

    <button id="btn-direita-drama"
      class="absolute right-0 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black px-4 py-2 rounded-full z-10">›</button>
  </div>
</div>

<!-- Ação -->
<div>
  <h2 class="mb-5 text-xl font-semibold">Ação</h2>
  <div class="relative">
    <button id="btn-esquerda-acao"
      class="absolute left-0 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black px-4 py-2 rounded-full z-10">‹</button>

    <div id="acao"
      class="flex gap-6 overflow-x-auto scroll-smooth px-12 pb-4 no-scrollbar"></div>

    <button id="btn-direita-acao"
      class="absolute right-0 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black px-4 py-2 rounded-full z-10">›</button>
  </div>
</div>

<!-- Comédia -->
<div>
  <h2 class="mb-5 text-xl font-semibold">Comédia</h2>
  <div class="relative">
    <button id="btn-esquerda-comedia"
      class="absolute left-0 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black px-4 py-2 rounded-full z-10">‹</button>

    <div id="comedia"
      class="flex gap-6 overflow-x-auto scroll-smooth px-12 pb-4 no-scrollbar"></div>

    <button id="btn-direita-comedia"
      class="absolute right-0 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black px-4 py-2 rounded-full z-10">›</button>
  </div>
</div>

<!--Terror-->
<div>
  <h2 class="mb-5 text-xl font-semibold">Terror</h2>
  <div class="relative">
    <button id="btn-esquerda-terror"
      class="absolute left-0 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black px-4 py-2 rounded-full z-10">‹</button>

    <div id="terror"
      class="flex gap-6 overflow-x-auto scroll-smooth px-12 pb-4 no-scrollbar"></div>

    <button id="btn-direita-terror"
      class="absolute right-0 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black px-4 py-2 rounded-full z-10">›</button>
  </div>
</div>

<!--Animação-->
<div>
  <h2 class="mb-5 text-xl font-semibold">Animação</h2>
  <div class="relative">
    <button id="btn-esquerda-animacao"
      class="absolute left-0 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black px-4 py-2 rounded-full z-10">‹</button>

    <div id="animacao"
      class="flex gap-6 overflow-x-auto scroll-smooth px-12 pb-4 no-scrollbar"></div>

    <button id="btn-direita-animacao"
      class="absolute right-0 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black px-4 py-2 rounded-full z-10">›</button>
  </div>
</div>

</section>

</main>  
<footer class="bg-gray-900 text-gray-400 py-6 mt-10">
  <div class="container mx-auto px-4 text-center">
    <p class="text-sm sm:text-base">
      © 2025 <span class="font-semibold text-white">CineTop</span>
    </p>
    <p class="text-xs sm:text-sm mt-2">
      Desenvolvido por 
      <span class="text-red-500 font-medium">
        <a href="https://www.linkedin.com/in/allan-carvalho-428b2a39a/" 
        target="_blank" 
        class="text-red-500 font-medium hover:underline hover:text-red-400 transition">
        Allan Carvalho Souza
      </a>
      </span>
    </p>
  </div>
</footer>

<script src="script.js"></script>
<script>
  const menuBtn = document.getElementById("menuBtn");
  const mobileMenu = document.getElementById("mobileMenu");

  menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
  });
</script>
</body>
</html>
